name: Secret Scanning Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Secret Scanning Review Action
        uses: advanced-security/secret-scanning-review-action@v2.2.4
        with:
          token: ${{ secrets.SECRET_SCANNING_TOKEN }}
          fail-on-alert: true
